    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "HoverTask",
      "url": "https://hovertask.com",
      "logo": "https://hovertask.com/images/logo.png",
      "description": "Earn money by completing social media tasks or advertise your products to the right audience. Join 500k+ members today!",
      "sameAs": [
        "https://www.facebook.com/hovertask",
        "https://twitter.com/hovertask",
        "https://www.instagram.com/hovertask",
        "https://www.linkedin.com/company/hovertask"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "support@hovertask.com",
        "contactType": "customer service",
        "availableLanguage": ["English"]
      },
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "NG",
        "addressLocality": "Lagos"
      }
    }
    </script>
    
    <!-- Structured Data - FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Hovertask?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hovertask is a comprehensive online marketplace platform that enables users to earn through various channels. You can buy and sell products, complete social media tasks, participate in marketing campaigns, and earn commissions through our reseller program."
          }
        },
        {
          "@type": "Question",
          "name": "How do I start earning on Hovertask?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Getting started is simple: 1) Create your account, 2) Choose your preferred earning method, 3) Complete verification, 4) Start engaging with available opportunities."
          }
        },
        {
          "@type": "Question",
          "name": "What are the payment methods available?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "HoverTask supports bank transfers, digital wallets, and cryptocurrency. Payments are typically processed within 24-72 hours."
          }
        },
        {
          "@type": "Question",
          "name": "Is KYC verification mandatory?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "KYC is mandatory for sellers and resellers to ensure platform security. Regular task performers may not need KYC unless earnings exceed certain thresholds."
          }
        },
        {
          "@type": "Question",
          "name": "What types of tasks can I complete?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We offer social media engagement, content creation, survey completion, app testing, and more. Task availability varies by region."
          }
        },
        {
          "@type": "Question",
          "name": "How does the reseller program work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Select products from verified sellers, set your markup, promote through your channels, and earn commission on successful sales."
          }
        }
      ]
    }
    </script>
    
    <!-- Structured Data - WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

        "target": "https://hovertask.com/marketplace?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
